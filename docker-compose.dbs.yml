services:
  postgres:
    image: postgres:16
    container_name: readme_postgres
    environment:
      POSTGRES_USER: readme
      POSTGRES_PASSWORD: readme123
      POSTGRES_DB: ms1_users
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readme -d ms1_users"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - readme_net

  mysql:
    image: mysql:8.0
    container_name: readme_mysql
    environment:
      MYSQL_ROOT_PASSWORD: readme123
      MYSQL_DATABASE: ms2_books
      MYSQL_USER: readme
      MYSQL_PASSWORD: readme123
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - readme_net

  mongodb:
    image: mongo:7
    container_name: readme_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - readme_net

  postgres-ms6:
    image: postgres:16
    container_name: readme_postgres_ms6
    environment:
      POSTGRES_USER: ${DB_USER:-readme}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-readme123}
      POSTGRES_DB: ms6_transactions
    ports:
      - "5434:5432"
    volumes:
      - pgdata_ms6:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-readme} -d ms6_transactions"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - readme_net

volumes:
  pgdata:
  mysqldata:
  mongodata:
  pgdata_ms6:

networks:
  readme_net:
    name: readme_net
